x-vps1-placement: &vps1-placement
  replicas: 1
  placement:
    constraints:
      - node.hostname == vps1

services:
  postiz:
    image: ghcr.io/omar7l/rahiel-social-media-planner:latest
    restart: always
    deploy: *vps1-placement
    environment:
      # Public URLs
      MAIN_URL: "${MAIN_URL}"
      FRONTEND_URL: "${FRONTEND_URL}"
      NEXT_PUBLIC_BACKEND_URL: "${NEXT_PUBLIC_BACKEND_URL}"

      # Social Apps
      INSTAGRAM_APP_ID: "${INSTAGRAM_APP_ID}"
      INSTAGRAM_APP_SECRET: "${INSTAGRAM_APP_SECRET}"

      FACEBOOK_APP_ID: "${FACEBOOK_APP_ID}"
      FACEBOOK_APP_SECRET: "${FACEBOOK_APP_SECRET}"

      GOOGLE_GMB_CLIENT_ID: "${YOUTUBE_CLIENT_ID}"
      GOOGLE_GMB_CLIENT_SECRET: "${YOUTUBE_CLIENT_SECRET}"

      YOUTUBE_CLIENT_ID: "${YOUTUBE_CLIENT_ID}"
      YOUTUBE_CLIENT_SECRET: "${YOUTUBE_CLIENT_SECRET}"

      LINKEDIN_CLIENT_ID: "${LINKEDIN_CLIENT_ID}"
      LINKEDIN_CLIENT_SECRET: "${LINKEDIN_CLIENT_SECRET}"

      TIKTOK_CLIENT_ID: "${TIKTOK_CLIENT_ID}"
      TIKTOK_CLIENT_SECRET: "${TIKTOK_CLIENT_SECRET}"

      # Auth
      JWT_SECRET: "${JWT_SECRET}"

      # Internal services
      DATABASE_URL: "postgresql://postiz-user:${POSTGRES_PASSWORD}@postiz-postgres:5432/postiz-db-local"
      REDIS_URL: "redis://postiz-redis:6379"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      TEMPORAL_ADDRESS: "temporal:7233"

      # App settings
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "${DISABLE_REGISTRATION}"
      RUN_CRON: "true"

      # Email / invites
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-resend}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
      EMAIL_FROM_NAME: "${EMAIL_FROM_NAME:-Rahiel Studios}"
      EMAIL_FROM_ADDRESS: "${EMAIL_FROM_ADDRESS:-planner@rahielstudios.ch}"

      # SMTP fallback when EMAIL_PROVIDER=nodemailer
      EMAIL_HOST: "${EMAIL_HOST}"
      EMAIL_PORT: "${EMAIL_PORT}"
      EMAIL_SECURE: "${EMAIL_SECURE:-false}"
      EMAIL_USER: "${EMAIL_USER}"
      EMAIL_PASS: "${EMAIL_PASS}"

      # Storage
      STORAGE_PROVIDER: "${STORAGE_PROVIDER:-local}"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "${NEXT_PUBLIC_UPLOAD_DIRECTORY:-/uploads}"

      # Cloudflare R2 when STORAGE_PROVIDER=cloudflare
      CLOUDFLARE_ACCOUNT_ID: "${CLOUDFLARE_ACCOUNT_ID}"
      CLOUDFLARE_ACCESS_KEY: "${CLOUDFLARE_ACCESS_KEY}"
      CLOUDFLARE_SECRET_ACCESS_KEY: "${CLOUDFLARE_SECRET_ACCESS_KEY}"
      CLOUDFLARE_REGION: "${CLOUDFLARE_REGION:-auto}"
      CLOUDFLARE_BUCKETNAME: "${CLOUDFLARE_BUCKETNAME}"
      CLOUDFLARE_BUCKET_URL: "${CLOUDFLARE_BUCKET_URL}"

      # Optional
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      API_LIMIT: "30"
      NX_ADD_PLUGINS: "false"

    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/

    expose:
      - "5000"

    networks:
      - postiz-network
      - temporal-network

    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_started

  postiz-postgres:
    image: postgres:17-alpine
    restart: always
    deploy: *vps1-placement
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "postiz-user"
      POSTGRES_DB: "postiz-db-local"
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz-user -d postiz-db-local"]
      interval: 10s
      timeout: 3s
      retries: 5

  postiz-redis:
    image: redis:7.2
    restart: always
    deploy: *vps1-placement
    command: redis-server --appendonly yes
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    restart: always
    deploy: *vps1-placement
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    expose:
      - "9200"
    volumes:
      - temporal-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - temporal-network

  temporal-postgresql:
    image: postgres:16
    restart: always
    deploy: *vps1-placement
    environment:
      POSTGRES_PASSWORD: "temporal"
      POSTGRES_USER: "temporal"
      POSTGRES_DB: "temporal"
    expose:
      - "5432"
    volumes:
      - temporal-postgresql-data:/var/lib/postgresql/data
    networks:
      - temporal-network

  temporal:
    image: temporalio/auto-setup:1.28.1
    restart: always
    deploy: *vps1-placement
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    expose:
      - "7233"
    networks:
      - temporal-network

  temporal-admin-tools:
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    restart: always
    deploy: *vps1-placement
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - temporal-network
    stdin_open: true
    tty: true
    depends_on:
      - temporal

  temporal-ui:
    image: temporalio/ui:2.34.0
    restart: always
    deploy: *vps1-placement
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=${MAIN_URL}
    expose:
      - "8080"
    networks:
      - temporal-network
    depends_on:
      - temporal

volumes:
  postgres-volume:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
  temporal-postgresql-data:
  temporal-elasticsearch-data:

networks:
  postiz-network:
    driver: bridge

  temporal-network:
    driver: bridge
