name: Monthly upstream sync

on:
  schedule:
    # First day of every month at 04:15 UTC.
    - cron: '15 4 1 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monthly-upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Merge upstream/main into Rahiel fork
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true

      - name: Add upstream and merge
        run: |
          git remote add upstream https://github.com/gitroomhq/postiz-app.git || git remote set-url upstream https://github.com/gitroomhq/postiz-app.git
          git fetch upstream main --tags
          git checkout main
          git merge --no-edit upstream/main

      - name: Push updated fork
        run: git push origin main --follow-tags
